# Application Name
spring.application.name=CampusConnect

# Database Configuration - Uses environment variables (Defaulted to localhost for local runs)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/campusconnect?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:123456789}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Server
server.port=${PORT:8080}

# CORS
cors.allowed-origins=http://localhost:3000,https://campusconnect-frontend-6j8c.onrender.com

# Logging
logging.level.root=INFO
logging.level.com.campusconnect=INFO

spring.jpa.open-in-view=false