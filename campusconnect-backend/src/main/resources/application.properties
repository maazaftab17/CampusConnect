# Application Name
spring.application.name=CampusConnect

# Database Configuration - Uses environment variables
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/campusconnect}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Server
server.port=${PORT:8080}

# CORS - Will be set via environment variable
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Logging
logging.level.root=INFO
logging.level.com.campusconnect=INFO