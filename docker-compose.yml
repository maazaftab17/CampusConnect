services:
  mysql-db:
    image: mysql:8
    container_name: campusconnect-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456789"
      MYSQL_DATABASE: "campusconnect"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456789"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend-app:
    build: ./campusconnect-backend
    container_name: campusconnect-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:mysql://mysql-db:3306/campusconnect
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=123456789
    depends_on:
      mysql-db:
        condition: service_healthy

volumes:
  mysql_data:

